name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-release-version.sh "${GITHUB_REF_NAME}"

  build:
    name: Build ${{ matrix.arch }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-26
          - arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-26-intel
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          xcode_path="$(python3 - <<'PY'
          from pathlib import Path

          candidates = list(Path("/Applications").glob("Xcode_26*.app"))
          if not candidates:
              raise SystemExit("The runner does not provide Xcode 26")

          def version(path):
              return tuple(int(part) for part in path.stem.removeprefix("Xcode_").split("."))

          print(max(candidates, key=version))
          PY
          )"
          sudo xcode-select --switch "$xcode_path/Contents/Developer"
          xcodebuild -version
          test -x "$(dirname "$(xcode-select -p)")/Applications/Icon Composer.app/Contents/Executables/ictool"

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build and ad-hoc sign artifacts
        env:
          BUNDLE_VERSION: ${{ github.run_number }}
          CODESIGN_IDENTITY: "-"
          RELEASE_VERSION: ${{ github.ref_name }}
        run: ./scripts/package-release.sh "${{ matrix.target }}" dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Add installer and checksums
        run: |
          cp scripts/install.sh scripts/uninstall.sh dist/
          cd dist
          sha256sum \
            UsageTracker-macos-arm64.zip \
            UsageTracker-macos-x86_64.zip \
            usage-macos-arm64.tar.gz \
            usage-macos-x86_64.tar.gz \
            install.sh \
            uninstall.sh > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md" \
            --title "UsageTracker ${GITHUB_REF_NAME#v}"
